<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs Project</title>

    <!-- styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    
      <div class="section-center">
        <div class="image">
          <img src="pic.jpg" />
        </div>
        <div class="tabs">
          <!-- btn container -->
          <div class="btn-container">
            <button class="button live" data-id="step1">Step 1</button>
            <button class="button" data-id="step2">Step 2</button>
            <button class="button" data-id="step3">Step 3</button>
            <button class="button" data-id="step4">Step 4</button>
          </div>
          <div class="tabs-content">
            <div class="content live" id="step1"></div>
            <div class="content" id="step2"></div>
            <div class="content" id="step3"></div>
            <div class="content" id="step4"></div>
          </div>
        </div>
      </div>
   
    <!-- javascript -->
     <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
     <!--导入一个专门把 Markdown 转换成 HTML 的库-->
    <script src="app.js"></script>
  </body>
</html>
