<!DOCTYPE html>
<!--这是html文件-->
<html lang="en">
<!--html前后括号，告知语言-->
<head>
<!--网页的设置区：标题/css/字体/编码-->
    <meta charset="UTF-8">
    <!--编码-->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!--历史遗留，可省略！！-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--让手机正常显示，网页宽度=设备宽度，使其缩放-->
    <link rel="stylesheet" href="style.css">
    <!--导入css-->
    <title>Random Emoji</title>
</head>
<body>
    <div class="content">
        <div class="date" id="date"></div>
        <h2>Random Emoji</h2>
        <div class="section">
            <!--div是一个盒子，网站就是盒子套盒子-->
            <button class="btn" id="btn">
                <img class="btn-bg" src="omkuji button.png">
                <span class="btn-text" id="fortune-text">おみくじ</span>
            </button>
            <!--class给css用，id给js用-->
            <p class="emoji-name" id="emoji-name">Omikuji</p>
        </div>
    </div>
    <script src="index.js"></script>
    <!--引用js文件-->
</body>
</html>
